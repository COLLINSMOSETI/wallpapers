<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallhaven · pinspire grid</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ---- password overlay (clean, no hint) ---- */
        .password-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.3s;
        }
        .password-card {
            background: #ffffff;
            width: 90%;
            max-width: 380px;
            padding: 2.5rem 2rem;
            border-radius: 40px;
            box-shadow: 0 30px 50px -20px #00000055;
            text-align: center;
            animation: cardPop 0.3s ease-out;
        }
        @keyframes cardPop {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }
        .password-card i {
            font-size: 2.8rem;
            color: #c00e0e;
            background: #ffeaea;
            padding: 1.2rem;
            border-radius: 50%;
            margin-bottom: 1.2rem;
        }
        .password-card h2 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #111;
            margin-bottom: 1.6rem;
        }
        .pass-input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid #ddd;
            border-radius: 60px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 500;
            letter-spacing: 6px;
            outline: none;
            background: #fafafa;
            transition: border 0.15s;
        }
        .pass-input:focus {
            border-color: #c00e0e;
        }
        .unlock-btn {
            width: 100%;
            background: #c00e0e;
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            margin: 1rem 0 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
            box-shadow: 0 8px 18px #c00e0e55;
        }
        .unlock-btn:hover {
            background: #9e0b0b;
        }
        .error-msg {
            color: #c00e0e;
            font-weight: 500;
            min-height: 2.5rem;
            margin-top: 0.8rem;
            font-size: 1rem;
        }
        /* no hint — removed */

        /* ---- main gallery (hidden until password) ---- */
        .gallery-wrap {
            max-width: 1440px;
            margin: 0 auto;
            padding: 1.2rem 1rem 2rem;
            display: none;
        }

        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 0.8rem 0 1.8rem;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand i {
            font-size: 2.2rem;
            color: #c00e0e;
            background: white;
            border-radius: 50%;
            padding: 0.3rem;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        .brand h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #a00f0f, #c00e0e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .counter {
            background: white;
            padding: 0.5rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            color: #1e1e1e;
            box-shadow: 0 5px 12px #ddd;
        }
        .counter i {
            color: #c00e0e;
            margin-right: 6px;
        }

        /* stable masonry grid */
        .masonry {
            column-count: 6;
            column-gap: 1rem;
        }
        .wall-card {
            break-inside: avoid;
            margin-bottom: 1rem;
            border-radius: 24px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 18px rgba(0,0,0,0.03);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            cursor: pointer;
        }
        .wall-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 30px -12px rgba(0,0,0,0.2);
        }
        .wall-card img {
            width: 100%;
            height: auto;
            display: block;
            background: #f2f2f2;
        }
        .wall-card .save-icon {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(4px);
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 1.3rem;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .wall-card:hover .save-icon {
            opacity: 1;
        }

        footer {
            text-align: center;
            padding: 2.8rem 0 1rem;
            color: #6b6b6b;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        /* responsive */
        @media (max-width: 1100px) { .masonry { column-count: 5; } }
        @media (max-width: 800px) { .masonry { column-count: 4; } }
        @media (max-width: 600px) { .masonry { column-count: 3; } }
        @media (max-width: 400px) { .masonry { column-count: 2; } }
    </style>
</head>
<body>

    <!-- PASSWORD LOCK (no hint) -->
    <div id="lockOverlay" class="password-overlay">
        <div class="password-card">
            <i class="fas fa-lock"></i>
            <h2>pinterest wall</h2>
            <input type="password" id="codeInput" class="pass-input" placeholder="••••" maxlength="4" inputmode="numeric">
            <button class="unlock-btn" id="unlockButton"><i class="fas fa-arrow-right-to-bracket"></i> enter</button>
            <div id="errorMsg" class="error-msg"></div>
            <!-- hint completely removed -->
        </div>
    </div>

    <!-- GALLERY (hidden until correct password) -->
    <main id="galleryMain" class="gallery-wrap">
        <div class="header-bar">
            <div class="brand">
                <i class="fab fa-pinterest"></i>
                <h1>Wallhaven</h1>
            </div>
            <div class="counter">
                <i class="fas fa-images"></i> 1,152 stable wallpapers
            </div>
        </div>

        <!-- masonry grid populated by js (stable set) -->
        <div id="wallGrid" class="masonry"></div>

        <footer>
            <i class="fas fa-download"></i> double click any image to demo save · 100% stable collection
        </footer>
    </main>

    <script>
        (function() {
            // --- PASSWORD LOGIC (clean, no hint) ---
            const overlay = document.getElementById('lockOverlay');
            const gallery = document.getElementById('galleryMain');
            const unlockBtn = document.getElementById('unlockButton');
            const pwdInput = document.getElementById('codeInput');
            const errorSpan = document.getElementById('errorMsg');
            const correctCode = '0004';

            function attemptUnlock() {
                const entered = pwdInput.value.trim();
                if (entered === correctCode) {
                    errorSpan.innerText = '';          // clear error
                    overlay.style.display = 'none';     // remove lock screen
                    gallery.style.display = 'block';    // show gallery
                    document.body.style.overflow = 'auto';
                } else {
                    errorSpan.innerText = '❌ wrong password';
                    pwdInput.value = '';                // clear field
                    pwdInput.focus();
                }
            }

            unlockBtn.addEventListener('click', attemptUnlock);
            pwdInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    attemptUnlock();
                }
            });
            // restrict to digits only, max 4
            pwdInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/\D/g, '').slice(0, 4);
            });

            // --- STABLE IMAGE SET (exactly 1152 items, each image URL is fixed, never random) ---
            // Using picsum with deterministic seeds and fixed dimensions ensures same images every time.
            // To be ultra-stable we avoid random() in src generation — we use loop index & fixed seed names.
            // But we want more than 1000 unique, consistent wallpapers.
            // I'll generate 1152 items using picsum with seeds: "wall001" to "wall1152"
            // No Math.random inside image strings – completely deterministic.
            
            const grid = document.getElementById('wallGrid');
            const totalImages = 1152;  // >1000, fixed number

            // predefine category-like names for variety (only used for alt text, not for src)
            const categories = [
                'coastal', 'alpine', 'urban', 'noir', 'pastel', 'neon', 'tropical', 'minimal',
                'abstract', 'retro', 'futuristic', 'botanical', 'wilderness', 'monochrome', 'aurora',
                'vintage', 'geometric', 'dreamscape', 'architecture', 'textures', 'space', 'macro'
            ];

            // Use DocumentFragment for performance
            const fragment = document.createDocumentFragment();

            for (let i = 1; i <= totalImages; i++) {
                // create stable seed: e.g., "stable-0001" to "stable-1152"
                const seed = `wallhaven-${String(i).padStart(4, '0')}`;   // stable unique seed per image
                
                // vary aspect ratio slightly for masonry feel, but still deterministic based on i
                // use i to pick one of 3 fixed ratios: 0.8, 1.2, 1.5 (makes layout organic but repeatable)
                const ratioIndex = i % 5;   // 0,1,2,3,4
                let heightMultiplier;
                if (ratioIndex === 0) heightMultiplier = 0.9;
                else if (ratioIndex === 1) heightMultiplier = 1.1;
                else if (ratioIndex === 2) heightMultiplier = 1.3;
                else if (ratioIndex === 3) heightMultiplier = 0.75;
                else heightMultiplier = 1.5;
                
                const baseWidth = 500;
                const height = Math.round(baseWidth * heightMultiplier);
                
                // build picsum URL — same seed = same image forever
                const imgUrl = `https://picsum.photos/seed/${seed}/${baseWidth}/${height}`;

                // alt category (just for show)
                const cat = categories[i % categories.length];

                // create card
                const card = document.createElement('div');
                card.className = 'wall-card';

                const img = document.createElement('img');
                img.src = imgUrl;
                img.alt = `${cat} wallpaper ${i}`;
                img.loading = 'lazy';   // lazy load but stable

                const iconDiv = document.createElement('div');
                iconDiv.className = 'save-icon';
                iconDiv.innerHTML = '<i class="fas fa-arrow-down"></i>';

                card.appendChild(img);
                card.appendChild(iconDiv);

                // optional click (demo download)
                card.addEventListener('click', () => {
                    alert(`📌 Save "${cat} ${i}" (demo – image #${i})`);
                });

                fragment.appendChild(card);
            }

            grid.appendChild(fragment);

            // Final: ensure gallery is hidden at start (CSS already .gallery-wrap display:none)
            // but if any fluke, double-set
            gallery.style.display = 'none';
        })();
    </script>

    <!-- small note: no hint, only wrong password message -->
</body>
</html>
